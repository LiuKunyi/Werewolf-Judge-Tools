<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狼人杀</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#1f2230;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    -webkit-user-select:none;
    user-select:none;
}

.container{
    width:95%;
    max-width:560px;
    background:#2a2d3d;
    padding:20px;
    border-radius:18px;

}

h1{
    text-align:center;

    font-weight:bold;
    margin-bottom:20px;
}

.role-row{
    display:flex;
    gap:8px;
    margin-top:10px;
    align-items:center;
}

select,input{
    height:46px;
    border:none;
    border-radius:10px;
    font-size:16px;

    background:#444b66;

}

select{
    flex:1;
    padding:0 10px;
    outline:none !important;
    box-shadow:none !important;

}

select:focus,
select:focus-visible{
    outline:none !important;
    box-shadow:none !important;
}

input{
    width:70px;
    text-align:center;
}

button{
    border:none;
    border-radius:12px;

}

.mainBtn{
    width:100%;

}

.blue{
    background:#5f7894;

}

.green{
    background:#739478;

}

.orange{

}

.addBtn{
    width:100%;

}

.removeBtn{

.whiteText{color:white;}

.hidden{

}

#miniHeader{

}

table{
    width:100%;

}

th,td{
    border:1px solid white;

}

.dead td{

}

.deadMark{

}

.deadBtn{
    width:18px;
    height:18px;
    min-width:18px;
    min-height:18px;
    border-radius:50%;
    border:2px solid white;
    background:transparent;
    display:block;
    margin:auto;
    appearance:none;
    -webkit-appearance:none;

}

.deadActive{
    background:#777;
    border-color:#777;
}

.numberCell{
    position:relative;
    text-align:center;
}
.numberCell .deadBtn{
    position:absolute;
    left:8px;
    top:50%;

}
.playerNum{
    display:block;
    width:100%;
    text-align:center;
}
.markWrap{
    position:absolute;
    right:6px;
    top:50%;
    transform:translateY(-50%);

    height:34px;
}
.markDisplay{
    position:absolute;
    inset:0;
    display:flex;

    justify-content:center;

}
.markSelect{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    opacity:0;
    cursor:pointer;
}

.voteNumberCell{
    position:relative;
    text-align:center;
}
.voteFactionMark{
    position:absolute;
    left:8px;
    top:50%;
    transform:translateY(-50%);

}
.voteFactionMark.gray{
    color:#777;
}
.votePlayerNum{
    display:block;
    width:100%;
    text-align:center;
}

.roleCell{
    position:relative;
    text-align:center;
}
.roleText{
    display:block;
    text-align:center;
}
.factionMark{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);

}
.factionMark.gray{
    color:#777;
}


.voteGrid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-top:20px;
}

.voteFlowTable{
    margin:0 auto;
    border-collapse:collapse;
    width:auto;
    display:inline-table;
}

.voteFlowTable{
    margin:0 auto;
    border-collapse:collapse;
}

.voteFlowTable td{
    border:none;
    padding:3px 8px;
    font-size:inherit;
}

.voteFlowTable tr:not(:last-child){
    border-bottom:1px solid rgba(255,255,255,0.25);
}

.flowFrom{
    text-align:right;
}

.flowArrow{
    text-align:center;
    padding-left:12px !important;
    padding-right:12px !important;
}

.flowTo{
    text-align:center;
    padding-right:12px !important;
}

.flowCount{
    text-align:left;
    padding-left:12px !important;
    padding-right:2px !important;
    border-left:1px solid rgba(255,255,255,0.35) !important;
}

.voteBtn{
    width:74px;
    height:74px;
    border-radius:50%;
    border:2px solid white;
    background:transparent;
    color:white;
    font-size:28px;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
}

.voteSelected{
    background:#a15c5c;
    border-color:#a15c5c;
}



.popupBg{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup{
    width:280px;
    background:#2a2d3d;
    border-radius:18px;
    padding:20px;
    text-align:center;
}

.popupText{
    font-size:22px;
    margin-bottom:20px;
    line-height:1.5;
}

.popupBtns{
    display:flex;
    gap:10px;
}

.popupBtn{
    flex:1;
    height:46px;
    border:none;
    border-radius:12px;
    font-size:18px;
}



.voteStartBtn{
    width:74px !important;
    height:74px !important;
    
    display:flex !important;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    line-height:1.05;
    padding-top:2px;
    box-sizing:border-box;
    margin:20px auto 0 auto !important;
}


select option{
    background:#383e56;
    color:white;
}

.pageSubTitle{
    text-align:center;
    font-size:28px;
    color:#cfcfcf;

    margin-top:0;
    margin-bottom:4px;
}


.voteBtnCapsule{
    border-radius:999px !important;
    min-width:150px !important;
    width:auto !important;
    height:52px !important;
    padding:0 28px !important;
    display:flex !important;
    justify-content:center;
    align-items:center;
}


.bottomCapsuleBtn{
    min-width:150px !important;
    width:auto !important;
    height:50px !important;
    min-height:50px !important;
    border:none !important;
    border-radius:999px !important;
    padding:0 28px !important;
    display:flex !important;
    justify-content:center !important;
    align-items:center !important;
    box-sizing:border-box !important;
    font-size:18px !important;
    line-height:1 !important;
    white-space:nowrap !important;
    aspect-ratio:auto !important;
}

.bottomCapsuleBtn.blue{
    background:#6f88a5 !important;
    color:white !important;
}


.bottomCapsuleBtn.gold{
    background:#7b7060 !important;
    color:white !important;
}

.bottomCapsuleBtn.orange{
    background:#7d705e !important;
    color:white !important;
}


.bottomCapsuleBtn.blue{
    background:#5f7894;
    color:white;
}

.bottomCapsuleBtn.green{
    background:#739478;
    color:white;
}

.bottomCapsuleBtn.orange{
    background:#7d705e;
    color:white;
}

.fixedBottomBtn{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom) + 18px);
    z-index:20;
}

.bottomSpacer{
    height:calc(50px + 6mm);
}


.mainBtn:active,
.addBtn:active,
.voteBtn:active{
    transform:scale(0.95);
    filter:brightness(.85);
}

.bottomCapsuleBtn:active{
    filter:brightness(.85);
}

.mainBtn,
.addBtn,
.voteBtn,
.bottomCapsuleBtn{
    transition:
        transform .08s ease,
        filter .08s ease;
    -webkit-tap-highlight-color:transparent;
}
.pressing{
    filter:brightness(.85);

</style>
</head>

<body>

<div class="container">


<h1 id="mainTitle">配置本局身份</h1>

<div id="miniHeader">
🐺 狼人杀
</div>

<div id="setupPage">

<button class="mainBtn orange" onclick="loadPreset()">
6人预设
</button>

<div id="roles"></div>

<button class="addBtn" onclick="addRole()">+</button>


<div class="winModeRow" style="
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
width:100%;
margin-top:14px;
">

<div style="
font-size:18px;
white-space:nowrap;
">
狼人胜利方式：
</div>

<div style="
display:flex;
justify-content:flex-end;
">
<select id="wolfWinMode"
style="
width:88px;
box-sizing:border-box;
">
<option value="edge">屠边</option>
<option value="city">屠城</option>
</select>
</div>

</div>

<div class="player" style="font-size:26px" id="totalPeople">
当前共0人
</div>

<button class="mainBtn blue" onclick="startGame()">
开始游戏
</button>

</div>

<div id="gamePage" class="hidden">

<div class="player" id="playerText"></div>

<div class="identity whiteText" id="identity">
———
</div>

<button class="mainBtn blue" id="mainButton" onclick="mainAction()">
点击查看身份
</button>

<button class="mainBtn orange hidden" id="nextButton" onclick="nextPlayer()">
下一位
</button>

<div id="result"></div>

</div>

</div>

<script>

document.addEventListener("copy",e=>e.preventDefault());
document.addEventListener("cut",e=>e.preventDefault());
document.addEventListener("contextmenu",e=>e.preventDefault());

window.addEventListener("beforeunload",function(e){
    e.preventDefault();
    e.returnValue="";
});



function showAlert(text){
    alert(text);
}

function showConfirm(text,yesCallback){
    if(confirm(text)){
        yesCallback();
    }
}

const allRoles=[

"平民",
"预言家","女巫","守卫","猎人","愚者","骑士",
"摄梦人","守墓人","猎魔人",
"黑市商人","定序王子",
"魔术师","禁言长老","狐狸","训熊师",

"狼人","狼王","白狼王",
"狼美人","机械狼","石像鬼","梦魇","血月使徒","恶灵骑士","隐狼",

"丘比特","混血儿","野孩子","咒狐","恶魔"
];

const evilRoles=[
"狼人","狼王","白狼王","狼美人","机械狼","石像鬼","梦魇","血月使徒","恶灵骑士","隐狼"
];

let identities=[];
let currentPlayer=1;
let state="view";
let deadPlayers=new Set();

let votes={};
let currentVoterIndex=0;
let alivePlayers=[];
let selectedVote=null;
let votedOutPlayer=null;
let pkPlayers=null;
let isPKVote=false;
let playerFaction=[];
let playerBaseFaction=[];
let night=1;
let speechTimer=null;
let speechSeconds=0;
let nightMarks={};
let manualNightDeaths=[];
let settlementText='昨晚是平安夜';
let permanentMarked=new Set();
let currentPage="identity";

const thirdPartyRoles=[
"丘比特","混血儿","野孩子","咒狐"
,"恶魔"];

function setPhaseTitle(text){

    document.getElementById("mainTitle")
    .innerText=text;
}

function factionSymbol(faction,gray=false){

    const color=gray?'#777777':(faction==="狼人"?'#954d4d':faction==="第三方"?'#d0d0d0':'#628167');
    const sym=faction==="狼人"?'▼':faction==="第三方"?'▣':'▲';
    return '<span style="color:'+color+'">'+sym+'</span>';
}

function roleToFaction(role){
    return ["丘比特","混血儿","野孩子","咒狐","恶魔"].includes(role)
        ? "第三方"
        : evilRoles.includes(role)
            ? "狼人"
            : "好人";
}

function roleToBaseFaction(role){
    return evilRoles.includes(role) ? "狼人" : "好人";
}

function getFactionAtIndex(index){

    return playerFaction[index] || roleToFaction(identities[index]||"");
}

function getFactionCounts(){

    let good=0,wolf=0,third=0;

    identities.forEach((role,i)=>{

        if(deadPlayers.has(i)) return;

        const faction=getFactionAtIndex(i);

        if(faction==="狼人") wolf++;
        else if(faction==="第三方") third++;
        else good++;
    });

    return {good,wolf,third};
}

function getFactionStats(){

    const {good,wolf,third}=getFactionCounts();

    return `
    <div style="
    text-align:center;
    margin-top:8px;
    margin-bottom:12px;
    color:#d0d0d0;
    line-height:1.7;
    ">
    第${night}晚｜好人${good}｜狼人${wolf}${third>0?`｜第三方${third}`:""}
    </div>
    `;
}

const godRoles=[
    "预言家","女巫","守卫","猎人","骑士","愚者",
    "守墓人","摄梦人","猎魔人","黑市商人",
    "定序王子","魔术师","禁言长老",
    "狐狸","训熊师"
    ];

function getNightOrderText(){

    const order=[];

    if(night===1 && identities.includes("丘比特")){
        order.push("丘比特");
        order.push("情侣");
    }

    if(night===1 && identities.includes("野孩子"))
        order.push("野孩子");

    if(night===1 && identities.includes("混血儿"))
        order.push("混血儿");

    if(identities.includes("魔术师"))
        order.push("魔术师");

    if(night===1 && identities.includes("黑市商人"))
	    order.push("黑市商人");
    
    if(identities.includes("禁言长老"))
        order.push("禁言长老");

    if(identities.includes("石像鬼"))
        order.push("石像鬼");

    if(identities.includes("狼美人"))
        order.push("狼美人");

    if(identities.includes("机械狼"))
        order.push("机械狼");
        
    if(identities.includes("梦魇"))
        order.push("梦魇");
        	
	if(identities.includes("摄梦人"))
        order.push("摄梦人");

    if(identities.includes("守卫"))
        order.push("守卫");

	if(identities.includes("恶魔"))
    order.push("恶魔");
	  
	if(identities.some(r=>evilRoles.includes(r)))
        order.push("狼人");

    if(identities.includes("女巫"))
        order.push("女巫");

    if(identities.includes("预言家"))
        order.push("预言家");

    if(identities.includes("狐狸"))
        order.push("狐狸");
        
    if(night>1 && identities.includes("黑市商人"))
		order.push("幸运儿")

    if(identities.includes("猎人"))
        order.push("猎人");

    if(identities.includes("狼王"))
        order.push("狼王");

    return `
    <div style="
    text-align:center;
    margin-top:12px;
    margin-bottom:12px;
    color:#d0d0d0;
    line-height:1.7;
    ">
    ${order.join(" → ")}
    </div>
    `;
}

function getRoleCounts(){

    let wolf=0,god=0,villager=0,third=0;


    identities.forEach((role,i)=>{

        if(deadPlayers.has(i)) return;

        const faction=getFactionAtIndex(i);

        if(faction==="第三方"){
            third++;
            return;
        }

        if(faction==="狼人"){
            wolf++;
            return;
        }

        if(role==="平民"){
            villager++;
        }else{
            god++;
        }
    });

    return {wolf,god,villager,third};
}

function cycleFaction(index){

    const role=identities[index];
    const current=getFactionAtIndex(index);
    let next;

    if(role==="丘比特"){
        if(night!==1) return;
        next=current==="第三方"?"好人":current==="好人"?"狼人":"第三方";
    }else if(role==="混血儿"){
        if(night!==1) return;
        next=current==="第三方"?"好人":current==="好人"?"狼人":"好人";
    }else if(role==="野孩子"){
        next=current==="第三方"?"好人":current==="好人"?"狼人":"好人";
    }else{
        if(!(night===1 && identities.includes("丘比特"))) return;
        next=current==="第三方" ? roleToBaseFaction(role) : "第三方";
    }

    showConfirm("将切换"+(index+1)+"号玩家的阵营为"+next,function(){
        playerFaction[index]=next;
        showIdentityTable();
    });
}


function getUsedRoles(){

    let arr=[];

    document.querySelectorAll("#roles select").forEach(s=>{

        arr.push(s.value);
    });

    return arr;
}

function updateTotal(){

    let total=0;

    document.querySelectorAll(".role-row input").forEach(i=>{

        let value=parseInt(i.value)||0;

        value=Math.max(0,Math.min(30,value));

        i.value=value;

        total+=value;
    });

    document.getElementById("totalPeople").innerText=
    "当前共"+total+"人";
}

document.addEventListener("input",updateTotal);
document.addEventListener("change",function(e){

    if(e.target.tagName==="SELECT"){

        rebuildRoleOptions();
    }
});



function rebuildRoleOptions(){

    const rows=[...document.querySelectorAll(".role-row")];

    const selectedRoles=rows.map(r=>
        r.querySelector("select").value
    );

    rows.forEach((row,index)=>{

        const current=selectedRoles[index];

        const usedElsewhere=selectedRoles.filter(
            (r,i)=>i!==index
        );

        const select=row.querySelector("select");

        
select.innerHTML="";

const groups=[
["好人阵营",["平民","预言家","女巫","守卫","猎人","愚者","骑士","摄梦人","守墓人","猎魔人","黑市商人","定序王子","魔术师","禁言长老","狐狸","训熊师"]],
["狼人阵营",["狼人","狼王","白狼王","狼美人","机械狼","石像鬼","梦魇","血月使徒","恶灵骑士","隐狼"]],
["第三方阵营",["丘比特","混血儿","野孩子","咒狐","恶魔"]]
];

groups.forEach(g=>{
const opt=document.createElement("optgroup");
opt.label=g[0];
g[1].forEach(role=>{
if(role===current || !usedElsewhere.includes(role)){
const option=document.createElement("option");
option.value=role;
option.textContent=role;
if(role===current) option.selected=true;
opt.appendChild(option);
}
});
select.appendChild(opt);
});
    });
}


function createRoleRow(role,count=1){

    const row=document.createElement("div");

    row.className="role-row";

    const used=getUsedRoles();

    const available=allRoles.filter(r=>!used.includes(r)||r===role);

    row.innerHTML=`
    <select>
    ${available.map(r=>
    `<option ${r===role?'selected':''}>${r}</option>`
    ).join("")}
    </select>

    <input type="text" inputmode="numeric" pattern="[0-9]*" value="${count}" min="0" max="30" onfocus="this.select()" oninput="this.value=this.value.replace(/[^0-9]/g,'')">

    <button class="removeBtn" type="button">−</button>
    `;

    row.querySelector(".removeBtn").onclick=function(){

        const rows=document.querySelectorAll(".role-row");

        if(rows.length<=1){

            showAlert("至少保留一个角色");
            return;
        }

        row.remove();

        rebuildRoleOptions();

        updateTotal();
    };

    document.getElementById("roles").appendChild(row);

    updateTotal();
}

function addRole(){

    const used=getUsedRoles();

    const available=allRoles.filter(r=>!used.includes(r));

    if(available.length===0){

        showAlert("没有可添加的角色了");
        return;
    }

    createRoleRow(available[0],1);

    rebuildRoleOptions();
}

function loadPreset(){

    const roles=document.getElementById("roles");

    roles.innerHTML="";

createRoleRow("平民",2);
    createRoleRow("狼人",2);
    createRoleRow("守卫",1);
    createRoleRow("预言家",1);

    rebuildRoleOptions();

    updateTotal();
}

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1));

        [array[i],array[j]]=[array[j],array[i]];
    }
}

function startGame(){

    let totalPlayers=0;

    document.querySelectorAll(".role-row input").forEach(input=>{

        totalPlayers += parseInt(input.value)||0;
    });

    if(totalPlayers<6){

        showAlert("玩家人数达到6人才能开始");
        return;
    }

       const selectedRoles=[
    ...document.querySelectorAll(".role-row select")
].map(s=>s.value);

      const banThirdCount=[
          "丘比特",
          "咒狐",
          "恶魔",
          "混血儿",
          "野孩子"
      ].filter(role=>selectedRoles.includes(role)).length;

      if(banThirdCount>1){

          showAlert("只能包含一个第三方角色");
          return;
}
    
	
    identities=[];

    let hasWolf=false;
    let hasGood=false;

    document.querySelectorAll(".role-row").forEach(row=>{

        const role=row.querySelector("select").value;

        const count=parseInt(
            row.querySelector("input").value
        )||0;

        if(evilRoles.includes(role)){
            hasWolf=true;
        }else if(!thirdPartyRoles.includes(role)){
            hasGood=true;
        }

        for(let i=0;i<count;i++){
            identities.push(role);
        }
    });

    if(!hasWolf){

        showAlert("至少要有一个狼人阵营角色才能开始");
        return;
    }

    if(!hasGood){

        showAlert("至少要有一个好人角色才能开始");
        return;
    }

    shuffle(identities);

    setPhaseTitle("分发身份");

    night=1;

    document.getElementById("setupPage")
    .classList.add("hidden");

    playerFaction=identities.map(role=>roleToFaction(role));

function getWinText(){

    const {wolf,god,villager,third}=getRoleCounts();

    const specialThirdAlive=identities.some(
    (role,i)=>
    (role==="咒狐" || role==="恶魔")
    && !deadPlayers.has(i)
);

    if(third>0 && wolf===0 && god===0 && villager===0){
        return '<div class="player" style="color:#d0d0d0">第三方胜利</div>';
    }

    if(wolf===0 && (god+villager)>0){

    if(specialThirdAlive){
        return '<div class="player" style="color:#d0d0d0">第三方胜利</div>';
    }

    return '<div class="player" style="color:#739478">好人胜利</div>';
}
    const wolfMode=document.getElementById("wolfWinMode").value;

    const hasGod=identities.some(r=>
        godRoles.includes(r)
    );

    const hasVillager=identities.some(r=>r==="平民");

    const antiControlRoles=["女巫","骑士","摄梦人","猎魔人"];

    const hasAntiControlRole=identities.some((role,i)=>
        !deadPlayers.has(i) &&
        getFactionAtIndex(i)==="好人" &&
        antiControlRoles.includes(role)
    );

    if(wolf>0 && wolf >= (god + villager) && !hasAntiControlRole){

        if(specialThirdAlive){
            return '<div class="player" style="color:#d0d0d0">第三方胜利</div>';
        }

        return '<div class="player" style="color:#a15c5c">狼人胜利</div>';
    }

    if(wolfMode==="edge"){

    if((hasGod && god===0) || (hasVillager && villager===0)){

        if(specialThirdAlive){
            return '<div class="player" style="color:#d0d0d0">第三方胜利</div>';
        }

        return '<div class="player" style="color:#a15c5c">狼人胜利</div>';
    }

    }else{

    if(god===0 && villager===0 && wolf>0){

        if(specialThirdAlive){
            return '<div class="player" style="color:#d0d0d0">第三方胜利</div>';
        }

        return '<div class="player" style="color:#a15c5c">狼人胜利</div>';
    }
        }

        return "";
    }

function formatSpeechTime(sec){
    const m=String(Math.floor(sec/60)).padStart(2,"0");
    const s=String(sec%60).padStart(2,"0");
    return m+":"+s;
}

function restartSpeechTimer(){
    if(speechTimer) clearInterval(speechTimer);
    speechSeconds=0;
    const el=document.getElementById("speechTimer");
    if(el) el.textContent="00:00";
    speechTimer=setInterval(()=>{
        speechSeconds++;
        const t=document.getElementById("speechTimer");
        if(t) t.textContent=formatSpeechTime(speechSeconds);
    },1000);
}

function needThirdPartyConfirm(){

    const hasCupid=identities.includes("丘比特");

    const thirdAlive=identities.some((role,i)=>
        !deadPlayers.has(i) &&
        getFactionAtIndex(i)==="第三方"
    );

    if(!thirdAlive){
        return false;
    }

    const mixedIndex=identities.findIndex(r=>r==="混血儿");

    if(
        mixedIndex!==-1 &&
        getFactionAtIndex(mixedIndex)==="第三方"
    ){
        return true;
    }

    const wildIndex=identities.findIndex(r=>r==="野孩子");

    if(
        wildIndex!==-1 &&
        getFactionAtIndex(wildIndex)==="第三方"
    ){
        return true;
    }

    if(hasCupid){

        let thirdCount=0;

        identities.forEach((role,i)=>{

            if(deadPlayers.has(i)) return;

            if(getFactionAtIndex(i)==="第三方"){
                thirdCount++;
            }
        });

        if(thirdCount<3){
            return true;
        }
    }

    return false;
}

function selectVote(target){

    document.querySelectorAll(".voteBtn")
    .forEach(btn=>{

        btn.classList.remove("voteSelected");
    });

    const id=
    target==="弃票"
    ?"voteX"
    :"vote"+target;

    document.getElementById(id)
    .classList.add("voteSelected");

    .classList.remove("hidden");

    :"确认投票";

function confirmVote(){

    const voter=alivePlayers[currentVoterIndex];

    votes[voter]=selectedVote;

    if(!voteFinishedPlayers.includes(voter)){

        voteFinishedPlayers.push(voter);
    }

    voteLogs=voteLogs.filter(v=>v.voter!==voter);

    voteLogs.push({
        voter:voter,
        target:selectedVote
    });

    renderVoteSelectPage();
}


function finishVoting(){
        setPhaseTitle("白天");

    currentPage="voteResult";

    let count={};

    let abstain=0;

    Object.values(votes).forEach(v=>{

        if(v==="弃票"){

            abstain++;

            return;
        }

        count[v]=(count[v]||0)+1;
    });

    let maxVote=Math.max(
        ...Object.values(count),
        0
    );

    let maxPlayers=Object.keys(count)
    .filter(x=>count[x]===maxVote)
    .map(x=>parseInt(x));

    let resultText="无人出局";

    if(maxPlayers.length===1 && maxVote>0){

        resultText=maxPlayers[0]+"号玩家出局";

        votedOutPlayer=parseInt(maxPlayers[0],10)-1;

        if(!deadPlayers.has(votedOutPlayer)){
            deadPlayers.add(votedOutPlayer);
    }


    }
    else if(maxPlayers.length>1){


        
if(isPKVote){

        resultText="无人出局";

    }else{

        resultText="平票";
    }

    }


    let voteFlow={};

    voteLogs.forEach(v=>{

        if(!voteFlow[v.target]){
            voteFlow[v.target]=[];
        }

        voteFlow[v.target].push(v.voter);
    });

    let flowRows=Object.entries(voteFlow)

    .sort((a,b)=>{

        if(a[0]==="弃票") return 1;
        if(b[0]==="弃票") return -1;

        return (count[b[0]]||0)-(count[a[0]]||0);
    })

    .map(([to,from])=>{

        const rightText=
            to==="弃票"
            ? `共${from.length}人`
            : `共${count[to]||0}票`;

        return `
        <tr>

            <td class="flowFrom">
            ${from.join(", ")}
            </td>

            <td class="flowArrow">
            →
            </td>

            <td class="flowTo">
            ${to==="弃票"?"弃":to}
            </td>

            <td class="flowCount">
            ${rightText}
            </td>

        </tr>
        `;
    })
    .join("");

let flowText=`
<table class="voteFlowTable">
${flowRows}
</table>
`;

    let html=getWinText()+`
    <div class="player">
    ${resultText}
    </div>

    <div style="
    text-align:center;
    margin-top:10px;
    margin-bottom:12px;
    color:#d0d0d0;
    line-height:1.7;
    ">
    <div style="display:inline-block">
    ${flowText}
    </div>
    </div>

    <div class="pageSubTitle">
    身份表
    </div>
    `;
    html+=`
    <table>

    <tr>
    <th>编号</th>
    <th>身份</th>
    </tr>
    `;
    identities.forEach((role,i)=>{

    html+=`
    <tr class="${deadPlayers.has(i)?'dead':''}">

    <td class="numberCell">

    <button
    type="button"
    class="deadBtn ${deadPlayers.has(i)?'deadActive':''}"
    onclick="toggleDead(${i})">
    </button>

    ${buildMarkDisplay(i)}

    <span class="playerNum"
    style="${permanentMarked.has(i)?'color:#b59b60;font-weight:bold;':''}">
    ${i+1}号
    </span>

    </td>

    <td class="roleCell">

    <span class="roleText">
    ${role}
    </span>

    <span class="factionMark ${deadPlayers.has(i)?'gray':''}">
    ${factionSymbol(
        getFactionAtIndex(i),
        deadPlayers.has(i)
    )}
    </span>

    </td>

    </tr>
    `;
    });
    html+=`
    </table>

    <div class="bottomSpacer"></div>
    `;

    if(getWinText()){

        html+=`
        <button
        class="bottomCapsuleBtn gold fixedBottomBtn"
        style="font-size:30px !important"
        onclick="confirmRestart()">
        ↻
        </button>
        `;

    }else if(maxPlayers.length===1 && maxVote>0){


        html+=`
        <button
        class="bottomCapsuleBtn gold fixedBottomBtn voteBtnCapsule"
        onclick="
        nightMarks={};
        manualNightDeaths=[];
        night++;
        showIdentityTable()
        ">
         进入下一晚
        </button>
        `;

    }
    else if(maxPlayers.length>1){

        if(isPKVote){

            html+=`
            <button
            class="bottomCapsuleBtn gold fixedBottomBtn voteBtnCapsule"
            onclick="
            nightMarks={};
            manualNightDeaths=[];
            night++;
            showIdentityTable()
            ">
            进入下一晚
            </button>
            `;

        }else{

            html+=`
            <button
            class="bottomCapsuleBtn gold fixedBottomBtn"
            onclick='startVote(${JSON.stringify(maxPlayers)})'>
            PK
            </button>
            `;
        }

    }else{

        html+=`
        <button
        class="bottomCapsuleBtn gold fixedBottomBtn voteBtnCapsule"
        onclick="
nightMarks={};
manualNightDeaths=[];
night++;
showIdentityTable()
">
        进入下一晚
        </button>
        `;
    }

    document.getElementById("result")
    .innerHTML=html;
}


function confirmRestart(){

    showConfirm(
        "将按照本局配置重新开始",
        function(){

            identities=[];

            deadPlayers=new Set();

            votes={};

            currentPlayer=1;
            night=1;
            playerFaction=[];
            playerBaseFaction=[];
            permanentMarked=new Set();
            nightMarks={};
            manualNightDeaths=[];
            settlementText='昨晚是平安夜';

            currentVoterIndex=0;

            votedOutPlayer=null;

            pkPlayers=null;


            document.getElementById("result").innerHTML="";

            setPhaseTitle("配置本局身份");

            document.getElementById("setupPage")
            .classList.remove("hidden");

            document.getElementById("gamePage")
            .classList.add("hidden");
        }
    );
}


createRoleRow("平民",1);
createRoleRow("狼人",1);
createRoleRow("预言家",1);
createRoleRow("守卫",1);

rebuildRoleOptions();

document.addEventListener("touchstart",e=>{

    const btn=e.target.closest(
        ".mainBtn,.addBtn,.voteBtn,.bottomCapsuleBtn,.removeBtn"
    );

    if(btn){
        btn.classList.add("pressing");
    }

},{passive:true});

document.addEventListener("touchend",()=>{

    document.querySelectorAll(".pressing")
    .forEach(el=>el.classList.remove("pressing"));

},{passive:true});

document.addEventListener("touchcancel",()=>{

    document.querySelectorAll(".pressing")
    .forEach(el=>el.classList.remove("pressing"));

},{passive:true});

</script>



</body>
</html>
