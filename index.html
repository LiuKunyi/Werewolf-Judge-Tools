<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狼人杀</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#1f2230;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
}

.container{
    width:95%;
    max-width:560px;
    background:#2a2d3d;
    padding:20px;
    border-radius:18px;
}

h1{
    text-align:center;
    font-size:40px;
    margin-bottom:20px;
}

.role-row{
    display:flex;
    gap:8px;
    margin-top:10px;
    align-items:center;
}

select,input{
    height:46px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
    background:#444b66;
    color:white;
}

select{
    flex:1;
    padding:0 10px;
}

input{
    width:70px;
    text-align:center;
}

button{
    border:none;
    border-radius:12px;
    cursor:pointer;
}

.mainBtn{
    width:100%;
    height:46px;
    margin-top:12px;
    font-size:18px;
}

.blue{
    background:#5f7894;
    color:white;
}

.green{
    background:#739478;
    color:white;
}

.orange{
    background:#6b6657;
    color:white;
}

.addBtn{
    width:100%;
    height:46px;
    margin-top:12px;
    background:#505a7a;
    color:white;
    font-size:30px;
}

.removeBtn{
    width:30px;
    height:30px;
    min-width:30px;
    border-radius:50%;
    background:#a15c5c;
    color:white;
    font-size:22px;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:0;
}

.player{
    text-align:center;
    font-size:34px;
    margin-top:18px;
}

.identity{
    height:84px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:46px;
    font-weight:normal;
}

.whiteText{color:white;}
.redText{color:#954d4d;}
.greenText{color:#628167;}
.yellowText{color:#b59b60;}

.hidden{
    display:none;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:16px;
    table-layout:fixed;
}

th,td{
    border:1px solid white;
    padding:8px 4px;
    text-align:center;
    font-size:18px;
    vertical-align:middle;
}

.dead td{
    color:#777;
}

.deadMark{
    width:34px;
}

.deadBtn{
    width:18px;
    height:18px;
    min-width:18px;
    min-height:18px;
    border-radius:50%;
    border:2px solid white;
    background:transparent;
    display:block;
    margin:auto;
    appearance:none;
    -webkit-appearance:none;
    padding:0;
}

.deadActive{
    background:#777;
    border-color:#777;
}

.voteGrid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-top:20px;
}

.voteBtn{
    width:74px;
    height:74px;
    border-radius:50%;
    border:2px solid white;
    background:transparent;
    color:white;
    font-size:28px;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
}

.voteSelected{
    background:#a15c5c;
    border-color:#a15c5c;
}



.popupBg{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup{
    width:280px;
    background:#2a2d3d;
    border-radius:18px;
    padding:20px;
    text-align:center;
}

.popupText{
    font-size:22px;
    margin-bottom:20px;
    line-height:1.5;
}

.popupBtns{
    display:flex;
    gap:10px;
}

.popupBtn{
    flex:1;
    height:46px;
    border:none;
    border-radius:12px;
    font-size:18px;
}



.voteStartBtn{
    width:74px !important;
    height:74px !important;
    
    display:flex !important;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    line-height:1.05;
    padding-top:2px;
    box-sizing:border-box;
    margin:20px auto 0 auto !important;
}


select option{
    background:#383e56;
    color:white;
}




.voteBtnCapsule{
    border-radius:999px !important;
    min-width:150px !important;
    width:auto !important;
    height:52px !important;
    padding:0 28px !important;
    display:flex !important;
    justify-content:center;
    align-items:center;
}


.bottomCapsuleBtn{
    min-width:150px !important;
    width:auto !important;
    height:50px !important;
    min-height:50px !important;
    border:none !important;
    border-radius:999px !important;
    padding:0 28px !important;
    display:flex !important;
    justify-content:center !important;
    align-items:center !important;
    box-sizing:border-box !important;
    font-size:18px !important;
    line-height:1 !important;
    white-space:nowrap !important;
    aspect-ratio:auto !important;
}

.bottomCapsuleBtn.blue{
    background:#6f88a5 !important;
    color:white !important;
}


.bottomCapsuleBtn.gold{
    background:#7b7060 !important;
    color:white !important;
}

.bottomCapsuleBtn.orange{
    background:#7d705e !important;
    color:white !important;
}


.bottomCapsuleBtn.blue{
    background:#5f7894;
    color:white;
}

.bottomCapsuleBtn.green{
    background:#739478;
    color:white;
}

.bottomCapsuleBtn.orange{
    background:#7d705e;
    color:white;
}

.fixedBottomBtn{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:3mm;
    z-index:20;
}


.voteBtnFix{
    bottom:18px !important;
}

.bottomSpacer{
    height:calc(50px + 6mm);
}

</style>
</head>

<body>

<div class="container">


<h1>狼人杀</h1>

<div id="subTitle"
style="
text-align:center;
font-size:28px;
margin-top:-8px;
margin-bottom:24px;
color:#cfcfcf;
display:none;
">
身份表
</div>


<div id="setupPage">

<button class="mainBtn orange" onclick="loadPreset()">
6人预设
</button>

<div id="roles"></div>

<button class="addBtn" onclick="addRole()">+</button>


<div class="winModeRow" style="
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
width:100%;
margin-top:14px;
">

<div style="
font-size:18px;
white-space:nowrap;
">
狼人胜利方式：
</div>

<div style="
display:flex;
justify-content:flex-end;
">
<select id="wolfWinMode"
style="
width:88px;
box-sizing:border-box;
">
<option value="edge">屠边</option>
<option value="city">屠城</option>
</select>
</div>

</div>

<div class="player" style="font-size:26px" id="totalPeople">
当前共0人
</div>

<button class="mainBtn blue" onclick="startGame()">
开始游戏
</button>

</div>

<div id="gamePage" class="hidden">

<div class="player" id="playerText"></div>

<div class="identity whiteText" id="identity">
———
</div>

<button class="mainBtn blue" id="mainButton" onclick="mainAction()">
点击查看身份
</button>

<button class="mainBtn orange hidden" id="nextButton" onclick="nextPlayer()">
下一位
</button>

<div id="result"></div>

</div>

</div>

<script>

const allRoles=[
"平民","狼人","狼王","白狼王",
"预言家","女巫","守卫","猎人",
"骑士","恶魔","自爆狼",
"狼美人","黑狼王","白痴",
"乌鸦","守墓人","摄梦人",
"丘比特","魔术师","奇迹商人"
];

const evilRoles=[
"狼人","狼王","白狼王",
"恶魔","自爆狼","狼美人","黑狼王"
];

let identities=[];
let currentPlayer=1;
let state="view";

    document.getElementById("result").innerHTML="";
let deadPlayers=new Set();

let votes={};
let currentVoterIndex=0;
let alivePlayers=[];
let selectedVote=null;
let votedOutPlayer=null;
let pkPlayers=null;
let isPKVote=false;

const thirdPartyRoles=[
"丘比特",
"魔术师",
"奇迹商人"
];


function getUsedRoles(){

    let arr=[];

    document.querySelectorAll("#roles select").forEach(s=>{

        arr.push(s.value);
    });

    return arr;
}

function updateTotal(){

    let total=0;

    document.querySelectorAll(".role-row input").forEach(i=>{

        let value=parseInt(i.value)||0;

        value=Math.max(0,Math.min(30,value));

        i.value=value;

        total+=value;
    });

    document.getElementById("totalPeople").innerText=
    "当前共"+total+"人";
}

document.addEventListener("input",updateTotal);
document.addEventListener("change",function(e){

    if(e.target.tagName==="SELECT"){

        rebuildRoleOptions();
    }
});



function rebuildRoleOptions(){

    const rows=[...document.querySelectorAll(".role-row")];

    const selectedRoles=rows.map(r=>
        r.querySelector("select").value
    );

    rows.forEach((row,index)=>{

        const current=selectedRoles[index];

        const usedElsewhere=selectedRoles.filter(
            (r,i)=>i!==index
        );

        const select=row.querySelector("select");

        select.innerHTML="";

        allRoles.forEach(role=>{

            if(
                role===current
                ||
                !usedElsewhere.includes(role)
            ){

                const option=document.createElement("option");

                option.value=role;
                option.textContent=role;

                if(role===current){

                    option.selected=true;
                }

                select.appendChild(option);
            }
        });
    });
}


function createRoleRow(role,count=1){

    const row=document.createElement("div");

    row.className="role-row";

    const used=getUsedRoles();

    const available=allRoles.filter(r=>!used.includes(r)||r===role);

    row.innerHTML=`
    <select>
    ${available.map(r=>
    `<option ${r===role?'selected':''}>${r}</option>`
    ).join("")}
    </select>

    <input type="text" inputmode="numeric" pattern="[0-9]*" value="${count}" min="0" max="30" onfocus="this.select()" oninput="this.value=this.value.replace(/[^0-9]/g,'')">

    <button class="removeBtn" type="button">−</button>
    `;

    row.querySelector(".removeBtn").onclick=function(){

        const rows=document.querySelectorAll(".role-row");

        if(rows.length<=1){

            showAlert("至少保留一个角色");
            return;
        }

        row.remove();

        rebuildRoleOptions();

        updateTotal();
    };

    document.getElementById("roles").appendChild(row);

    updateTotal();
}

function addRole(){

    const used=getUsedRoles();

    const available=allRoles.filter(r=>!used.includes(r));

    if(available.length===0){

        showAlert("没有可添加的角色了");
        return;
    }

    createRoleRow(available[0],1);
}

function loadPreset(){

    const roles=document.getElementById("roles");

    roles.innerHTML="";

    

function showAlert(text){

    document.getElementById("popupText").innerText=text;

    document.getElementById("popupCancel")
    .classList.add("hidden");

    document.getElementById("popupBg")
    .style.display="flex";

    document.getElementById("popupOk").onclick=function(){

        document.getElementById("popupBg")
        .style.display="none";
    };
}

function showConfirm(text,yesCallback){

    document.getElementById("popupText").innerText=text;

    document.getElementById("popupCancel")
    .classList.remove("hidden");

    document.getElementById("popupBg")
    .style.display="flex";

    document.getElementById("popupOk").onclick=function(){

        document.getElementById("popupBg")
        .style.display="none";

        yesCallback();
    };

    document.getElementById("popupCancel").onclick=function(){

        document.getElementById("popupBg")
        .style.display="none";
    };
}




function confirmRestart(){

    showConfirm(
        "按照本局配置重新开始",
        function(){

            identities=[];

            deadPlayers=new Set();

            votes={};

            currentPlayer=1;

            currentVoterIndex=0;

            votedOutPlayer=null;

            pkPlayers=null;

            document.getElementById("subTitle").style.display="none";

            document.getElementById("result").innerHTML="";

            document.getElementById("setupPage")
            .classList.remove("hidden");

            document.getElementById("gamePage")
            .classList.add("hidden");
        }
    );
}


createRoleRow("平民",2);
    createRoleRow("狼人",2);
    createRoleRow("守卫",1);
    createRoleRow("预言家",1);

    rebuildRoleOptions();

    updateTotal();
}

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1));

        [array[i],array[j]]=[array[j],array[i]];
    }
}

function startGame(){

    identities=[];

    let hasWolf=false;
    let hasGood=false;

    document.querySelectorAll(".role-row").forEach(row=>{

        const role=row.querySelector("select").value;

        const count=parseInt(
            row.querySelector("input").value
        )||0;

        if(evilRoles.includes(role)){

            hasWolf=true;

        }else{

            hasGood=true;
        }

        for(let i=0;i<count;i++){

            identities.push(role);
        }
    });

    if(!hasWolf){

        showAlert("至少要有一个狼方阵营角色才能开始");
        return;
    }

    if(!hasGood){

        showAlert("至少要有一个好人角色才能开始");
        return;
    }

    shuffle(identities);

    document.getElementById("setupPage")
    .classList.add("hidden");

    document.getElementById("gamePage")
    .classList.remove("hidden");

    currentPlayer=1;

    document.getElementById("subTitle").style.display="none";

    updatePlayer();
}

function updatePlayer(){

    document.getElementById("playerText").innerText=
    currentPlayer+"号玩家";

    const identity=document.getElementById("identity");

    identity.classList.remove("hidden");

    identity.innerText="———";

    identity.className="identity whiteText";

    identity.style.fontSize="46px";

    document.getElementById("mainButton")
    .innerText="点击查看身份";

    document.getElementById("mainButton")
    .className="mainBtn blue";

    document.getElementById("mainButton")
    .classList.remove("hidden");

    document.getElementById("nextButton")
    .classList.add("hidden");

    state="view";

    document.getElementById("result").innerHTML="";
}

function mainAction(){

    const role=identities[currentPlayer-1];

    const identity=document.getElementById("identity");

    if(state==="view"){

        identity.innerText=role;

        identity.style.fontSize="46px";

        if(evilRoles.includes(role)){

            identity.className="identity redText";

        }else{

            identity.className="identity greenText";
        }

        document.getElementById("mainButton")
        .innerText="知道了";

        document.getElementById("mainButton")
        .className="mainBtn green";

        state="know";

    }else{

        document.getElementById("playerText").innerText="";

        identity.innerText="法官点击";

        identity.className="identity yellowText";

        identity.style.fontSize="44px";

        document.getElementById("mainButton")
        .classList.add("hidden");

        const btn=document.getElementById("nextButton");

        btn.classList.remove("hidden");

        

        if(currentPlayer>=identities.length){

            btn.classList.add("hidden");

        }else{

            btn.innerText="下一位";

            btn.classList.remove("fixedBottomBtn");

            btn.classList.remove("hidden");
        }

        document.getElementById("result").innerHTML=`
        <button
        class="bottomCapsuleBtn gold fixedBottomBtn"
        
        onclick="${
        currentPlayer>=identities.length
        ?'showIdentityTable()'
        :'confirmShowAll()'
        }">
        查看身份表
        </button>
        `;
    }
}



function confirmShowAll(){

    showConfirm(
        "跳转到身份表，而不展示剩余玩家身份",
        function(){

            showIdentityTable();
        }
    );
}


function nextPlayer(){

    if(currentPlayer<identities.length){

        currentPlayer++;

        updatePlayer();

    }else{

        showIdentityTable();
    }
}

function toggleDead(index){

    const winNow=getWinText();

    if(winNow && !deadPlayers.has(index)){

        return;
    }



    if(deadPlayers.has(index)){

        showConfirm(
            "移除"+(index+1)+"号玩家的出局标记",
            function(){

                deadPlayers.delete(index);

                showIdentityTable();
            }
        )

    }else{

        showConfirm(
            "标记"+(index+1)+"号玩家为出局",
            function(){

                deadPlayers.add(index);

                showIdentityTable();
            }
        )
    }
}

function getWinText(){

    const hasThirdParty=identities.some(r=>
        thirdPartyRoles.includes(r)
    );

    if(hasThirdParty){

        return "";
    }

    const wolfMode=document.getElementById("wolfWinMode")
    ?document.getElementById("wolfWinMode").value
    :"edge";

    let wolfAlive=false;
    let villagerAlive=false;
    let godAlive=false;

    identities.forEach((role,i)=>{

        if(deadPlayers.has(i)) return;

        if(evilRoles.includes(role)){

            wolfAlive=true;

        }else if(role==="平民"){

            villagerAlive=true;

        }else{

            godAlive=true;
        }
    });

    if(!wolfAlive){

        return '<div class="player" style="color:#739478">村民胜利</div>';
    }

    const hasVillager=identities.includes("平民");

    const hasGod=identities.some(r=>
        !evilRoles.includes(r) && r!=="平民"
    );

    if(wolfMode==="edge"){

        if(
            (hasVillager && !villagerAlive)
            ||
            (hasGod && !godAlive)
        ){

            return '<div class="player" style="color:#a15c5c">狼人胜利</div>';
        }

    }else{

        if(
            !villagerAlive
            &&
            !godAlive
        ){

            return '<div class="player" style="color:#a15c5c">狼人胜利</div>';
        }
    }

    if(false){

        return '<div class="player" style="color:#a15c5c">狼人胜利</div>';
    }

    return "";
}

function showIdentityTable(){

    document.getElementById("subTitle").style.display="block";
    document.getElementById("subTitle").innerText="身份表";

    document.getElementById("playerText")
    .innerText="";

    document.getElementById("identity")
    .classList.add("hidden");

    document.getElementById("mainButton")
    .classList.add("hidden");

    document.getElementById("nextButton")
    .classList.add("hidden");

    let players=[];

    identities.forEach((role,i)=>{

        players.push({
            index:i,
            role:role,
            dead:deadPlayers.has(i)
        });
    });

    let html=getWinText();

    html+=`
    <table>

    <tr>
    <th class="deadMark"></th>
    <th>编号</th>
    <th>身份</th>
    </tr>
    `;

    players.forEach(p=>{

        html+=`
        <tr class="${p.dead?'dead':''}">

        <td class="deadMark">

        <button
        type="button"
        class="deadBtn ${p.dead?'deadActive':''}"
        onclick="toggleDead(${p.index})">
        </button>

        </td>

        <td>${p.index+1}号</td>

        <td>${p.role}</td>

        </tr>
        `;
    });

    html+=`
    </table>

    <div class="bottomSpacer"></div>
    `;

    if(!getWinText()){

        html+=`
        <button
class="bottomCapsuleBtn blue fixedBottomBtn"
onclick="confirmStartVote()">
投票
</button>
        `;

    }else{

        html+=`
        <button
        class="bottomCapsuleBtn gold fixedBottomBtn"
        style="font-size:34px;margin-top:30px"
        onclick="confirmRestart()">
        ↻
        </button>
        `;
    }

    document.getElementById("result").innerHTML=html;
}



function confirmStartVote(){

    showConfirm(
        "进入投票",
        function(){

            startVote();
        }
    );
}



let voteFinishedPlayers=[];
let voteLogs=[];

function renderVoteSelectPage(){

    document.getElementById("subTitle").style.display="block";
    document.getElementById("subTitle").innerText="投票";

    let html=`
    <div class="player yellowText">
    法官点击
    </div>

    <div class="voteGrid">
    `;

    alivePlayers.forEach(v=>{

        const done=voteFinishedPlayers.includes(v);

        html+=`
        <button
        class="mainBtn"
        style="
        height:52px;
        margin-top:0;
        border-radius:16px;
        ${
            done
            ?'background:transparent;border:2px solid #777;color:#777;':'background:transparent;border:2px solid #7ea2cc;color:#9fc0e8;'
        }
        "
        ${done?'disabled':''}
        onclick="showConfirm(
'进入${v}号玩家投票页',
function(){
openVotePlayer(${v});
})">
        ${v}号玩家
        </button>
        `;
    });

    html+=`</div>`;

    html+=`
<div class="bottomSpacer"></div>

<button
class="bottomCapsuleBtn gold fixedBottomBtn"
onclick="checkVoteResult()">
查看投票结果
</button>
`;

    document.getElementById("result").innerHTML=html;
}


function checkVoteResult(){

    const unvoted=alivePlayers.filter(
        v=>!voteFinishedPlayers.includes(v)
    );

    if(unvoted.length){

        showAlert(
            unvoted.join("、")+"号玩家还未投票，无法查看。"
        );
        return;
    }

    showConfirm(
        "查看投票结果",
        function(){
            finishVoting();
        }
    );
}

function openVotePlayer(voter){

    currentVoterIndex=alivePlayers.indexOf(voter);

    showVotePage();
}

function startVote(players=null){

    votes={};

    selectedVote=null;

    pkPlayers=players;

    isPKVote=players!==null;

    alivePlayers=[];

    identities.forEach((r,i)=>{

        if(deadPlayers.has(i)) return;

        if(isPKVote && pkPlayers.includes(i+1)) return;

        alivePlayers.push(i+1);
    });

    currentVoterIndex=0;

    voteFinishedPlayers=[];
    voteLogs=[];

    renderVoteSelectPage();
}

function showVotePage(){

    if(currentVoterIndex>=alivePlayers.length){

        finishVoting();
        return;
    }

    const voter=alivePlayers[currentVoterIndex];

    document.getElementById("subTitle").style.display="block";
    document.getElementById("subTitle").innerText="投票";

    let targets=pkPlayers||alivePlayers;

    targets=targets.filter(
        x=>!deadPlayers.has(x-1)
    );

    let html=`
    <div class="player">
    ${voter}号玩家投票
    </div>

    <div class="voteGrid">
    `;

    targets.forEach(i=>{

        html+=`
        <button
        class="voteBtn"
        id="vote${i}"
        onclick="selectVote(${i})">
        ${i}
        </button>
        `;
    });

    if(!isPKVote){

        html+=`
        <button
        class="voteBtn"
        id="voteX"
        onclick="selectVote('弃票')">
        <span style="font-size:34px;line-height:0.9;display:flex;align-items:center;justify-content:center">✕</span>
        </button>
        `;
    }

    html+=`
    </div>

    <button
    class="mainBtn green hidden"
    style="margin-top:30px" id="confirmVote"
    onclick="confirmVote()">
    确认投票
    </button>
    `;

    document.getElementById("result").innerHTML=
    `<div>`+
    html+
    `</div>`;
}

function selectVote(target){

    selectedVote=target;

    document.querySelectorAll(".voteBtn")
    .forEach(btn=>{

        btn.classList.remove("voteSelected");
    });

    const id=
    target==="弃票"
    ?"voteX"
    :"vote"+target;

    document.getElementById(id)
    .classList.add("voteSelected");

    document.getElementById("confirmVote")
    .classList.remove("hidden");

    document.getElementById("confirmVote").innerText=
    target==="弃票"
    ?"确认弃票"
    :"确认投票";
}

function confirmVote(){

    const voter=alivePlayers[currentVoterIndex];

    votes[voter]=selectedVote;

    if(!voteFinishedPlayers.includes(voter)){

        voteFinishedPlayers.push(voter);
    }

    voteLogs=voteLogs.filter(v=>v.voter!==voter);

    voteLogs.push({
        voter:voter,
        target:selectedVote
    });

    renderVoteSelectPage();
}


function finishVoting(){

    let count={};

    let abstain=0;

    Object.values(votes).forEach(v=>{

        if(v==="弃票"){

            abstain++;

            return;
        }

        count[v]=(count[v]||0)+1;
    });

    let maxVote=Math.max(
        ...Object.values(count),
        0
    );

    let maxPlayers=Object.keys(count)
    .filter(x=>count[x]===maxVote)
    .map(x=>parseInt(x));

    let resultText="无人出局";

    if(maxPlayers.length===1 && maxVote>0){

        resultText=maxPlayers[0]+"号玩家出局";

    }else if(maxPlayers.length>1){

        
if(isPKVote){

        resultText="无人出局";

    }else{

        resultText="平票";
    }

    }

    document.getElementById("subTitle").style.display="none";

    let voteFlow={};

    voteLogs.forEach(v=>{

        if(!voteFlow[v.target]){
            voteFlow[v.target]=[];
        }

        voteFlow[v.target].push(v.voter);
    });

    let flowText=Object.entries(voteFlow)
    .map(([to,from])=>
        from.join(",")+" → "+to
    ).join("<br>");

    let html=`
    <div class="player">
    ${resultText}
    </div>

    <div style="
    text-align:center;
    margin-top:10px;
    margin-bottom:12px;
    color:#d0d0d0;
    line-height:1.7;
    ">
    ${flowText}
    </div>

    <table>

    <tr>
    <th>玩家</th>
    <th>票数</th>
    </tr>
    `;

    let resultPlayers=[];

    for(let i=1;i<=identities.length;i++){

        resultPlayers.push({
            id:i,
            vote:count[i]||0,
            dead:deadPlayers.has(i-1)
        });
    }

    resultPlayers.sort((a,b)=>{

        if(a.dead!==b.dead){

            return a.dead-b.dead;
        }

        return b.vote-a.vote || a.id-b.id;
    });

    resultPlayers.forEach(p=>{

        html+=`
        <tr class="${p.dead?'dead':''}">

        <td>${p.id}号</td>

        <td>${p.vote}</td>

        </tr>
        `;
    });

    html+=`
    <tr>
    <td>弃票</td>
    <td>${abstain}</td>
    </tr>

    </table>

    <div class="bottomSpacer"></div>
    `;

    if(maxPlayers.length===1 && maxVote>0){

        votedOutPlayer=maxPlayers[0]-1;

        html+=`
        <button
        class="bottomCapsuleBtn blue fixedBottomBtn voteBtnCapsule"
        style="font-size:34px;margin-top:30px"
        onclick="applyVoteOut()">
        ←
        </button>
        `;

    }else if(maxPlayers.length>1){

        if(isPKVote){

            html+=`
            <button
            class="bottomCapsuleBtn blue fixedBottomBtn voteBtnCapsule"
            style="font-size:29px;margin-top:30px"
            onclick="showIdentityTable()">
            ←
            </button>
            `;

        }else{

            html+=`
            <button
            class="bottomCapsuleBtn gold fixedBottomBtn"
            onclick='startVote(${JSON.stringify(maxPlayers)})'>
            PK
            </button>
            `;
        }

    }else{

        html+=`
        <button
        class="bottomCapsuleBtn blue fixedBottomBtn voteBtnCapsule"
        style="font-size:34px;margin-top:30px"
        onclick="showIdentityTable()">
        ←
        </button>
        `;
    }

    document.getElementById("result")
    .innerHTML=html;
}


function applyVoteOut(){

    if(votedOutPlayer!==null){

        deadPlayers.add(votedOutPlayer);
    }

    votedOutPlayer=null;

    showIdentityTable();
}



function showAlert(text){

    document.getElementById("popupText").innerText=text;

    document.getElementById("popupCancel")
    .classList.add("hidden");

    document.getElementById("popupBg")
    .style.display="flex";

    document.getElementById("popupOk").onclick=function(){

        document.getElementById("popupBg")
        .style.display="none";
    };
}

function showConfirm(text,yesCallback){

    document.getElementById("popupText").innerText=text;

    document.getElementById("popupCancel")
    .classList.remove("hidden");

    document.getElementById("popupBg")
    .style.display="flex";

    document.getElementById("popupOk").onclick=function(){

        document.getElementById("popupBg")
        .style.display="none";

        yesCallback();
    };

    document.getElementById("popupCancel").onclick=function(){

        document.getElementById("popupBg")
        .style.display="none";
    };
}




function confirmRestart(){

    showConfirm(
        "按照本局配置重新开始",
        function(){

            identities=[];

            deadPlayers=new Set();

            votes={};

            currentPlayer=1;

            currentVoterIndex=0;

            votedOutPlayer=null;

            pkPlayers=null;

            document.getElementById("subTitle").style.display="none";

            document.getElementById("result").innerHTML="";

            document.getElementById("setupPage")
            .classList.remove("hidden");

            document.getElementById("gamePage")
            .classList.add("hidden");
        }
    );
}


createRoleRow("平民",1);
createRoleRow("狼人",1);
createRoleRow("预言家",1);
createRoleRow("守卫",1);

rebuildRoleOptions();
