<script>

    JSON.parse(

const thirdPartyRoles=[
"丘比特","混血儿","野孩子","咒狐"
,"恶魔"];

const evilRoles=[
"狼人","狼王","白狼王","狼美人","机械狼","石像鬼","梦魇","血月使徒","恶灵骑士","隐狼"
];

const goodRoles=[
"平民",
"预言家","女巫","守卫","猎人","愚者","骑士",
"摄梦人","守墓人","猎魔人",
"黑市商人","定序王子",
"魔术师","禁言长老","狐狸","训熊师"
];

function setPhaseTitle(text){

    document.getElementById("mainTitle")
    .innerText=text;
}

function factionSymbol(faction,gray=false){

    const color=gray?'#777777':(faction==="狼人"?'#954d4d':faction==="第三方"?'#d0d0d0':'#628167');
    const sym=faction==="狼人"?'▼':faction==="第三方"?'▣':'▲';
    return '<span style="color:'+color+'">'+sym+'</span>';
}

function roleToFaction(role){
    return ["丘比特","混血儿","野孩子","咒狐","恶魔"].includes(role)
        ? "第三方"
        : evilRoles.includes(role)
            ? "狼人"
            : "好人";
}

function roleToBaseFaction(role){
    return evilRoles.includes(role) ? "狼人" : "好人";
}

function getFactionAtIndex(index){

    return playerFaction[index] || roleToFaction(identities[index]||"");
}

function getFactionCounts(){

    let good=0,wolf=0,third=0;

    identities.forEach((role,i)=>{

        if(deadPlayers.has(i)) return;

        const faction=getFactionAtIndex(i);

        if(faction==="狼人") wolf++;
        else if(faction==="第三方") third++;
        else good++;
    });

    return {good,wolf,third};
}

function getFactionStats(){

    const {good,wolf,third}=getFactionCounts();

    return `
    <div style="
    text-align:center;
    margin-top:8px;
    margin-bottom:12px;
    color:#d0d0d0;
    line-height:1.7;
    ">
    第${night}晚｜好人${good}｜狼人${wolf}${third>0?`｜第三方${third}`:""}
    </div>
    `;
}

const godRoles=[
    "预言家","女巫","守卫","猎人","骑士","愚者",
    "守墓人","摄梦人","猎魔人","黑市商人",
    "定序王子","魔术师","禁言长老",
    "狐狸","训熊师"
    ];

function getNightOrderText(){

    const order=[];

    if(night===1 && identities.includes("丘比特")){
        order.push("丘比特");
        order.push("情侣");
    }

    if(night===1 && identities.includes("野孩子"))
        order.push("野孩子");

    if(night===1 && identities.includes("混血儿"))
        order.push("混血儿");

    if(identities.includes("魔术师"))
        order.push("魔术师");

    if(night===1 && identities.includes("黑市商人"))
	    order.push("黑市商人");
    
    if(identities.includes("禁言长老"))
        order.push("禁言长老");

    if(identities.includes("石像鬼"))
        order.push("石像鬼");

    if(identities.includes("狼美人"))
        order.push("狼美人");

    if(identities.includes("机械狼"))
        order.push("机械狼");
        
    if(identities.includes("梦魇"))
        order.push("梦魇");
        	
	if(identities.includes("摄梦人"))
        order.push("摄梦人");

    if(identities.includes("守卫"))
        order.push("守卫");

	if(identities.includes("恶魔"))
    order.push("恶魔");
	  
	if(identities.some(r=>evilRoles.includes(r)))
        order.push("狼人");

    if(identities.includes("女巫"))
        order.push("女巫");

    if(identities.includes("预言家"))
        order.push("预言家");

    if(identities.includes("狐狸"))
        order.push("狐狸");
        
    if(night>1 && identities.includes("黑市商人"))
		order.push("幸运儿")
  
	if(night>1 && identities.includes("守墓人"))
		order.push("守墓人")

    if(identities.includes("猎人"))
        order.push("猎人");

    if(identities.includes("狼王"))
        order.push("狼王");

    return `
    <div style="
    text-align:center;
    margin-top:12px;
    margin-bottom:12px;
    color:#d0d0d0;
    line-height:1.7;
    ">
    ${order.join(" → ")}
    </div>
    `;
}

function getRoleCounts(){

    let wolf=0,god=0,villager=0,third=0;


    identities.forEach((role,i)=>{

        if(deadPlayers.has(i)) return;

        const faction=getFactionAtIndex(i);

        if(faction==="第三方"){
            third++;
            return;
        }

        if(faction==="狼人"){
            wolf++;
            return;
        }

        if(role==="平民"){
            villager++;
        }else{
            god++;
        }
    });

    return {wolf,god,villager,third};
}

function cycleFaction(index){

    const role=identities[index];
    const current=getFactionAtIndex(index);
    let next;

    if(role==="丘比特"){
        if(night!==1) return;
        next=current==="第三方"?"好人":current==="好人"?"狼人":"第三方";
    }else if(role==="混血儿"){
        if(night!==1) return;
        next=current==="第三方"?"好人":current==="好人"?"狼人":"好人";
    }else if(role==="野孩子"){
        next=current==="第三方"?"好人":current==="好人"?"狼人":"好人";
    }else{
        if(!(night===1 && identities.includes("丘比特"))) return;
        next=current==="第三方" ? roleToBaseFaction(role) : "第三方";
    }

    showConfirm("将切换"+(index+1)+"号玩家的阵营为"+next,function(){
        playerFaction[index]=next;
        showIdentityTable();
    });
}

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1));

        [array[i],array[j]]=[array[j],array[i]];
    }
}

function handleRoleClick(role){

    if(role==="平民" || role==="狼人"){

        editSpecialRole(role);
        return;
    }

    removeRoleFromSetup(role);
}

function editSpecialRole(role){

    const target=
    setupRoles.find(
        r=>r.role===role
    );

    if(!target){
        return;
    }

    const value=prompt(
        "请输入"+role+"数量",
        target.count
    );

    if(value===null){
        return;
    }

    const count=parseInt(value);

    if(isNaN(count) || count<0){
        return;
    }

    if(count===0){

        removeRoleFromSetup(role);

        return;
    }

    target.count=count;

    currentPreset="custom";

    showAvailableRoles=true;

    renderCapsuleSetup();
}

function removeRoleFromSetup(role){

    setupRoles=
    setupRoles.filter(r=>
        r.role!==role
    );

    currentPreset="custom";

    showAvailableRoles=true;

    renderCapsuleSetup();
}

function handleAddRole(role){

    const selectedRoles=
    setupRoles.map(r=>r.role);

    const hasCupid=
    selectedRoles.includes("丘比特");

    if(
        hasCupid &&
        thirdPartyRoles.includes(role) &&
        role!=="丘比特"
    ){

        showAlert(
            "请先删除丘比特，再添加其他第三方角色"
        );

        return;
    }

    if(
        role==="丘比特" &&
        selectedRoles.some(r=>
            thirdPartyRoles.includes(r) &&
            r!=="丘比特"
        )
    ){

        showAlert(
            "请先删除其他第三方角色，再添加丘比特"
        );

        return;
    }

    if(
        role==="咒狐" &&
        selectedRoles.includes("恶魔")
    ){

        showAlert(
            "咒狐和恶魔不能同时出现"
        );

        return;
    }

    if(
        role==="恶魔" &&
        selectedRoles.includes("咒狐")
    ){

        showAlert(
            "咒狐和恶魔不能同时出现"
        );

        return;
    }

    if(role==="平民" || role==="狼人"){

        const value=prompt(
            "请输入"+role+"数量",
            1
        );

        if(value===null){
            return;
        }

        const count=parseInt(value);

        if(isNaN(count) || count<=0){
            return;
        }

        addRoleToSetup(role,count);

        return;
    }

    addRoleToSetup(role,1);
}

function addRoleToSetup(role,count=1){

    setupRoles.push({
        role:role,
        count:count
    });

    currentPreset="custom";

    showAvailableRoles=true;

    renderCapsuleSetup();
}

function startGame(){

    let totalPlayers=getTotalPlayers();

    if(totalPlayers<6){

        showAlert("玩家人数达到6人才能开始");
        return;
    }

        const selectedRoles=
        setupRoles.map(r=>r.role);
    
    identities=[];

    let hasWolf=false;
    let hasGood=false;

    setupRoles.forEach(item=>{

        const role=item.role;
        const count=item.count;

        if(evilRoles.includes(role)){
            hasWolf=true;
        }else if(!thirdPartyRoles.includes(role)){
            hasGood=true;
        }

        for(let i=0;i<count;i++){
            identities.push(role);
        }
    });

    if(!hasWolf){

        showAlert("至少要有一个狼人阵营角色才能开始");
        return;
    }

    if(!hasGood){

        showAlert("至少要有一个好人角色才能开始");
        return;
    }

    shuffle(identities);

    setPhaseTitle("分发身份");

    night=1;

    document.getElementById("setupPage")
    .classList.add("hidden");

    playerFaction=identities.map(role=>roleToFaction(role));
    playerBaseFaction=identities.map(role=>roleToBaseFaction(role));


    document.getElementById("gamePage")
    .classList.remove("hidden");

    currentPlayer=1;


    updatePlayer();
}

function getWinText(){

    const {wolf,god,villager,third}=getRoleCounts();

    const specialThirdAlive=identities.some(
    (role,i)=>
    (role==="咒狐" || role==="恶魔")
    && !deadPlayers.has(i)
);

    if(third>0 && wolf===0 && god===0 && villager===0){
        return '<div class="player" style="color:#d0d0d0">第三方胜利</div>';
    }

    if(wolf===0 && (god+villager)>0){

    if(specialThirdAlive){
        return '<div class="player" style="color:#d0d0d0">第三方胜利</div>';
    }

    return '<div class="player" style="color:#739478">好人胜利</div>';
}
    const wolfMode=wolfWinMode;

    const hasGod=identities.some(r=>
        godRoles.includes(r)
    );

    const hasVillager=identities.some(r=>r==="平民");

    const antiControlRoles=["女巫","骑士","摄梦人","猎魔人"];

    const hasAntiControlRole=identities.some((role,i)=>
        !deadPlayers.has(i) &&
        getFactionAtIndex(i)==="好人" &&
        antiControlRoles.includes(role)
    );

    if(wolf>0 && wolf >= (god + villager) && !hasAntiControlRole){

        if(specialThirdAlive){
            return '<div class="player" style="color:#d0d0d0">第三方胜利</div>';
        }

        return '<div class="player" style="color:#a15c5c">狼人胜利</div>';
    }

    if(wolfMode==="edge"){

    if((hasGod && god===0) || (hasVillager && villager===0)){

        if(specialThirdAlive){
            return '<div class="player" style="color:#d0d0d0">第三方胜利</div>';
        }

        return '<div class="player" style="color:#a15c5c">狼人胜利</div>';
    }

    }else{

    if(god===0 && villager===0 && wolf>0){

        if(specialThirdAlive){
            return '<div class="player" style="color:#d0d0d0">第三方胜利</div>';
        }

        return '<div class="player" style="color:#a15c5c">狼人胜利</div>';
    }
        }

        return "";
    }

function buildMarkControl(index){

    if(deadPlayers.has(index)){
        return `<div class="markWrap"><span class="markDisplay">⬜</span></div>`;
    }

    const marks=nightMarks[index]||[];

    const display=
    marks.length
    ? marks.map(m=>MARKS[m].icon).join("")
    : "⬜";

    let options=`
    <option value="">

    </option>
    `;

    if(identities.some(r=>evilRoles.includes(r)))
        options+=`<option value="wolfKill">🐺 狼刀目标</option>`;

    if(identities.includes("守卫"))
        options+=`<option value="guard">🛡️ 守护目标</option>`;

    if(identities.includes("女巫"))
        options+=`<option value="poison">🧪 女巫目标</option>`;

    if(identities.includes("摄梦人"))
        options+=`<option value="dream">💤 摄梦目标</option>`;

    if(identities.includes("禁言长老"))
        options+=`<option value="silence">🔇 禁言目标</option>`;

    if(identities.includes("狼美人"))
        options+=`<option value="wolfBeauty">🌹 狼美人目标</option>`;

    if(identities.includes("梦魇"))
        options+=`<option value="nightmare">😈 梦魇目标</option>`;

    if(identities.includes("黑市商人"))
        options+=`<option value="merchant">🎁 商人目标</option>`;

    if(identities.includes("魔术师"))
        options+=`<option value="magician">🎭 魔术师目标</option>`;

    options+=`
    <option value="undo">
    ↩ 撤销标记
    </option>
    `;

    return `
    <div class="markWrap">

        <span class="markDisplay">${display}</span>

        <select class="markSelect"

        onchange="

        if(this.value==='undo'){

            if(nightMarks[${index}] &&
               nightMarks[${index}].length){

                nightMarks[${index}].pop();

                if(!nightMarks[${index}].length){
                    delete nightMarks[${index}];
                }
            }

        }else if(this.value){

            Object.keys(nightMarks).forEach(k=>{

                nightMarks[k]=
                (nightMarks[k]||[])
                .filter(m=>m!==this.value);

                if(!nightMarks[k].length){
                    delete nightMarks[k];
                }
            });

            if(!nightMarks[${index}]){
                nightMarks[${index}]=[];

            if(!nightMarks[${index}].includes(this.value)){
                nightMarks[${index}].push(this.value);
            }
        }

        showIdentityTable();

        "

        >

        ${options}

        </select>

function formatSpeechTime(sec){
    const m=String(Math.floor(sec/60)).padStart(2,"0");
    const s=String(sec%60).padStart(2,"0");
    return m+":"+s;
}

function updateSpeechTimer(){

    const main=
    document.getElementById(
        "speechMain"
    );

    const decimal=
    document.getElementById(
        "speechDecimal"
    );

    if(!main || !decimal){
        return;
    }

    main.innerText=
    formatSpeechTime(
        speechSeconds
    );

    decimal.innerText=
    "."+speechTenths;
}

function restartSpeechTimer(){

    if(speechTimer){
        clearInterval(speechTimer);
    }

    speechSeconds=0;
    speechTenths=0;

    updateSpeechTimer();

    speechTimer=setInterval(()=>{

        speechTenths++;

        if(speechTenths>=10){

            speechTenths=0;
            speechSeconds++;
        }

        updateSpeechTimer();

    },100);

}

function showSpeechPage(){
    setPhaseTitle("白天");

    document.getElementById("playerText").innerText="";
    document.getElementById("identity").classList.add("hidden");
    document.getElementById("mainButton").classList.add("hidden");
    document.getElementById("nextButton").classList.add("hidden");

    if(speechTimer) clearInterval(speechTimer);
    speechTimer=null;
    speechSeconds=0;

    document.getElementById("result").innerHTML=`
    <div id="speechTimer"
	onclick="restartSpeechTimer()"
	style="
	text-align:center;
	font-size:56px;
	margin-top:75px;
	margin-bottom:0;
	user-select:none;
	cursor:pointer;
	">
	
	<span id="speechMain">
	00:00
	</span>
	
	<span id="speechDecimal">
	.0
	</span>
	
	</div>

    <div class="bottomSpacer"></div>

    <button class="bottomCapsuleBtn blue fixedBottomBtn"
    onclick="confirmEnterVote()">
    结束发言环节
    </button>`;

    restartSpeechTimer();
}

function needThirdPartyConfirm(){

    const hasCupid=identities.includes("丘比特");

    const thirdAlive=identities.some((role,i)=>
        !deadPlayers.has(i) &&
        getFactionAtIndex(i)==="第三方"
    );

    if(!thirdAlive){
        return false;
    }

    const mixedIndex=identities.findIndex(r=>r==="混血儿");

    if(
        mixedIndex!==-1 &&
        getFactionAtIndex(mixedIndex)==="第三方"
    ){
        return true;
    }

    const wildIndex=identities.findIndex(r=>r==="野孩子");

    if(
        wildIndex!==-1 &&
        getFactionAtIndex(wildIndex)==="第三方"
    ){
        return true;
    }

    if(hasCupid){

        let thirdCount=0;

        identities.forEach((role,i)=>{

            if(deadPlayers.has(i)) return;

            if(getFactionAtIndex(i)==="第三方"){
                thirdCount++;
            }
        });

        if(thirdCount<3){
            return true;
        }
    }

    return false;
}

function confirmStartVote(){

    if(needThirdPartyConfirm()){

        showAlert("请先处理第三方阵营切换");
        return;
    }

    let tonightDeaths=[];
    
    currentDreamTarget=null;

        for(let i=0;i<identities.length;i++){

            if(hasMark(i,"dream")){
                currentDreamTarget=i;
                break;
        }
    }

    if(
        currentDreamTarget!==null &&
        currentDreamTarget===lastDreamTarget
    ){

        if(!deadPlayers.has(currentDreamTarget)){

            deadPlayers.add(currentDreamTarget);

            tonightDeaths.push(currentDreamTarget);
        }
    }
    
    manualNightDeaths.forEach(i=>{

	    if(!tonightDeaths.includes(i)){
        tonightDeaths.push(i);
	    }
	});

    

    identities.forEach((r,i)=>{

        const wolfKill=hasMark(i,"wolfKill");
        const poison=hasMark(i,"poison");
        const guard=hasMark(i,"guard");
        const dream=hasMark(i,"dream");

        let die=false;

        if(wolfKill){

            if(!guard && !dream){
                die=true;
            }
        }

        if(poison){

            if(!dream){
                die=true;
            }
        }

        if(die){

            if(!deadPlayers.has(i)){
                deadPlayers.add(i);

                if(!tonightDeaths.includes(i)){
                    tonightDeaths.push(i);
                }
            }
        }
    });  
  
    if(tonightDeaths.length){

    const sortedDeaths=[...tonightDeaths]
        .sort((a,b)=>a-b);

    settlementText='昨晚'
        +sortedDeaths.map(i=>i+1).join(', ')
        +'号出局';

    }else{
        settlementText='昨晚是平安夜';
    }

    showConfirm("将进行今晚的结算",function(){
        lastDreamTarget=currentDreamTarget;
        showDeathSettlementPage();
    });
}

function confirmEnterVote(){

    showConfirm(
        "将进入投票环节",
        function(){
            startVote();
        }
    );
}


let voteFinishedPlayers=[];
let voteLogs=[];

function renderVoteSelectPage(){
    setPhaseTitle("白天");

    let html=`
    <div class="player yellowText">
    法官点击
    </div>

    <div class="voteGrid">
    `;

    alivePlayers.forEach(v=>{

        const done=voteFinishedPlayers.includes(v);

        html+=`
        <button
        class="mainBtn"
        style="
        height:52px;
        margin-top:0;
        border-radius:16px;
        ${
            done
            ?'background:transparent;border:2px solid #777;color:#777;':'background:transparent;border:2px solid #7ea2cc;color:#9fc0e8;'
        }
        "
        ${done?'disabled':''}
        onclick="openVotePlayer(${v})">
        ${v}号玩家
        </button>
        `;
    });

    html+=`</div>`;

    html+=`
<div class="bottomSpacer"></div>

${
voteFinishedPlayers.length===0
?
`<button
class="bottomCapsuleBtn gold fixedBottomBtn"
onclick="confirmSkipNight()">
进入下一晚
</button>`
:
`<button
class="bottomCapsuleBtn gold fixedBottomBtn"
onclick="checkVoteResult()">
查看投票结果
</button>`
}
`;

    document.getElementById("result").innerHTML=html;
}



function confirmSkipNight(){

    showConfirm(
        "将结束此环节，进入下一晚",
        function(){

            nightMarks={};
            manualNightDeaths=[];

            currentDreamTarget=null;
            night++;
            showIdentityTable();
        }
    );
}

function checkVoteResult(){

    const unvoted=alivePlayers.filter(
        v=>!voteFinishedPlayers.includes(v)
    );

    if(unvoted.length){

        showAlert(
            unvoted.join(", ")+"号玩家还未投票，无法查看"
        );
        return;
    }

    showConfirm(
        "将显示投票结果",
        function(){
            finishVoting();
        }
    );
}

function openVotePlayer(voter){

    currentVoterIndex=alivePlayers.indexOf(voter);

    showVotePage();
}

function startVote(players=null){

    votes={};

    selectedVote=null;

    pkPlayers=players;

    isPKVote=players!==null;

    alivePlayers=[];

    identities.forEach((r,i)=>{

        if(deadPlayers.has(i)) return;

        if(isPKVote && pkPlayers.includes(i+1)) return;

        alivePlayers.push(i+1);
    });

    currentVoterIndex=0;

    voteFinishedPlayers=[];
    voteLogs=[];

    renderVoteSelectPage();
}

function showVotePage(){
    setPhaseTitle("白天");

    if(currentVoterIndex>=alivePlayers.length){

        finishVoting();
        return;
    }

    const voter=alivePlayers[currentVoterIndex];


    let targets=pkPlayers||alivePlayers;

    targets=targets.filter(
        x=>!deadPlayers.has(x-1)
    );

    let html=`
    <div class="player">
    ${voter}号玩家投票
    </div>

    <div class="voteGrid">
    `;

    targets.forEach(i=>{

        html+=`
        <button
        class="voteBtn"
        id="vote${i}"
        onclick="selectVote(${i})">
        ${i}
        </button>
        `;
    });

    if(!isPKVote){

        html+=`
        <button
        class="voteBtn"
        id="voteX"
        onclick="selectVote('弃票')">
        <span style="font-size:34px;line-height:0.9;display:flex;align-items:center;justify-content:center">✕</span>
        </button>
        `;
    }

    html+=`
    </div>

    <button
    class="mainBtn green hidden"
    style="margin-top:30px" id="confirmVote"
    onclick="confirmVote()">
    确认投票
    </button>
    `;

    document.getElementById("result").innerHTML=
    `<div>`+
    html+
    `</div>`;
}

function selectVote(target){

    selectedVote=target;

    document.querySelectorAll(".voteBtn")
    .forEach(btn=>{

        btn.classList.remove("voteSelected");
    });

    const id=
    target==="弃票"
    ?"voteX"
    :"vote"+target;

    document.getElementById(id)
    .classList.add("voteSelected");

    document.getElementById("confirmVote")
    .classList.remove("hidden");

    document.getElementById("confirmVote").innerText=
    target==="弃票"
    ?"确认弃票"
    :"确认投票";
}

function confirmVote(){

    const voter=alivePlayers[currentVoterIndex];

    votes[voter]=selectedVote;

    if(!voteFinishedPlayers.includes(voter)){

        voteFinishedPlayers.push(voter);
    }

    voteLogs=voteLogs.filter(v=>v.voter!==voter);

    voteLogs.push({
        voter:voter,
        target:selectedVote
    });

    renderVoteSelectPage();
}


function finishVoting(){
        setPhaseTitle("白天");

    currentPage="voteResult";

    let count={};

    let abstain=0;

    Object.values(votes).forEach(v=>{

        if(v==="弃票"){

            abstain++;

            return;
        }

        count[v]=(count[v]||0)+1;
    });

    let maxVote=Math.max(
        ...Object.values(count),
        0
    );

    let maxPlayers=Object.keys(count)
    .filter(x=>count[x]===maxVote)
    .map(x=>parseInt(x));

    let resultText="无人出局";

    if(maxPlayers.length===1 && maxVote>0){

        resultText=maxPlayers[0]+"号玩家出局";

        votedOutPlayer=parseInt(maxPlayers[0],10)-1;

        if(!deadPlayers.has(votedOutPlayer)){
            deadPlayers.add(votedOutPlayer);
    }


    }
    else if(maxPlayers.length>1){


        
if(isPKVote){

        resultText="无人出局";

    }else{

        resultText="平票";
    }

    }


    let voteFlow={};

    voteLogs.forEach(v=>{

        if(!voteFlow[v.target]){
            voteFlow[v.target]=[];
        }

        voteFlow[v.target].push(v.voter);
    });

    let flowRows=Object.entries(voteFlow)

    .sort((a,b)=>{

        if(a[0]==="弃票") return 1;
        if(b[0]==="弃票") return -1;

        return (count[b[0]]||0)-(count[a[0]]||0);
    })

    .map(([to,from])=>{

        const rightText=
            to==="弃票"
            ? `共${from.length}人`
            : `共${count[to]||0}票`;

        return `
        <tr>

            <td class="flowFrom">
            ${from.join(", ")}
            </td>

            <td class="flowArrow">
            →
            </td>

            <td class="flowTo">
            ${to==="弃票"?"弃":to}
            </td>

            <td class="flowCount">
            ${rightText}
            </td>

        </tr>
        `;
    })
    .join("");

let flowText=`
<table class="voteFlowTable">
${flowRows}
</table>
`;

    let html=getWinText()+`
    <div class="player">
    ${resultText}
    </div>

    <div style="
    text-align:center;
    margin-top:10px;
    margin-bottom:12px;
    color:#d0d0d0;
    line-height:1.7;
    ">
    <div style="display:inline-block">
    ${flowText}
    </div>
    </div>

    <div class="pageSubTitle">
    身份表
    </div>
    `;
    html+=`
    <table>

    <tr>
    <th>编号</th>
    <th>身份</th>
    </tr>
    `;
    identities.forEach((role,i)=>{

    html+=`
    <tr class="${deadPlayers.has(i)?'dead':''}">

    <td class="numberCell">

    <button
    type="button"
    class="deadBtn ${deadPlayers.has(i)?'deadActive':''}"
    onclick="toggleDead(${i})">
    </button>

    ${buildMarkDisplay(i)}

    <span class="playerNum"
    style="${permanentMarked.has(i)?'color:#b59b60;font-weight:bold;':''}">
    ${i+1}号
    </span>

    </td>

    <td class="roleCell">

    <span class="roleText">
    ${role}
    </span>

    <span class="factionMark ${deadPlayers.has(i)?'gray':''}">
    ${factionSymbol(
        getFactionAtIndex(i),
        deadPlayers.has(i)
    )}
    </span>

    </td>

    </tr>
    `;
    });
    html+=`
    </table>

    <div class="bottomSpacer"></div>
    `;

    if(getWinText()){

        html+=`
        <button
        class="bottomCapsuleBtn gold fixedBottomBtn"
        style="font-size:30px !important"
        onclick="confirmRestart()">
        ↻
        </button>
        `;

    }else if(maxPlayers.length===1 && maxVote>0){


        html+=`
        <button
        class="bottomCapsuleBtn gold fixedBottomBtn voteBtnCapsule"
        onclick="
        nightMarks={};
        manualNightDeaths=[];
        currentDreamTarget=null;
        night++;
        showIdentityTable()
        ">
         进入下一晚
        </button>
        `;

    }
    else if(maxPlayers.length>1){

        if(isPKVote){

            html+=`
            <button
            class="bottomCapsuleBtn gold fixedBottomBtn voteBtnCapsule"
            onclick="
            nightMarks={};
            manualNightDeaths=[];
            currentDreamTarget=null;
            night++;
            showIdentityTable()
            ">
            进入下一晚
            </button>
            `;

        }else{

            html+=`
            <button
            class="bottomCapsuleBtn gold fixedBottomBtn"
            onclick='startVote(${JSON.stringify(maxPlayers)})'>
            PK
            </button>
            `;
        }

    }else{

        html+=`
        <button
        class="bottomCapsuleBtn gold fixedBottomBtn voteBtnCapsule"
        onclick="
        nightMarks={};
        manualNightDeaths=[];
        currentDreamTarget=null;
        night++;
        showIdentityTable()
        ">
        进入下一晚
        </button>
        `;
    }

    document.getElementById("result")
    .innerHTML=html;
}


function confirmRestart(){

    showConfirm(
        "将按照本局配置重新开始",
        function(){

            identities=[];

            deadPlayers=new Set();

            votes={};

            currentPlayer=1;
            night=1;
            playerFaction=[];
            playerBaseFaction=[];
            permanentMarked=new Set();
            nightMarks={};
            manualNightDeaths=[];
            settlementText='昨晚是平安夜';

            currentVoterIndex=0;

            votedOutPlayer=null;

            pkPlayers=null;

            lastDreamTarget=null;
            
            currentDreamTarget=null;

            document.getElementById("result").innerHTML="";

            setPhaseTitle("配置本局身份");

            document.getElementById("setupPage")
            .classList.remove("hidden");

            document.getElementById("gamePage")
            .classList.add("hidden");

            if(speechTimer){
                clearInterval(speechTimer);
                speechTimer=null;
}
        }
    );
}

document.addEventListener("touchstart",e=>{

    const btn=e.target.closest(
        ".mainBtn,.addBtn,.voteBtn,.bottomCapsuleBtn,.removeBtn"
    );

    if(btn){
        btn.classList.add("pressing");
    }

},{passive:true});

document.addEventListener("touchend",()=>{

    document.querySelectorAll(".pressing")
    .forEach(el=>el.classList.remove("pressing"));

},{passive:true});

document.addEventListener("touchcancel",()=>{

    document.querySelectorAll(".pressing")
    .forEach(el=>el.classList.remove("pressing"));

},{passive:true});

applyPreset("witch6");

</script>
